<!doctype html>
<html lang="de">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>D&D 5E – Zauber</title>
    <link rel="stylesheet" href="./styles.css" />
</head>

<body class="app">
    <!-- Topbar -->
    <header class="appbar">
        <div class="appbar__left">
        </div>

        <div class="appbar__right">
            <button id="btnMenu" class="btn" aria-label="Menü">Charaktere</button>
            <button id="btnNavOpen" class="btn" aria-label="Sheet Navigation">Navigation</button>
            <button id="btnLogout" class="btn" style="display:none">Logout</button>
        </div>
    </header>

    <!-- Drawer -->
    <div id="drawer" class="drawer" aria-hidden="true">
        <div class="drawer__header">
            <strong id="drawerUserTitle">Charaktere</strong>
            <button id="btnCloseDrawer" class="btn" aria-label="Schließen">✕</button>
        </div>

        <div class="drawer__content">
            <div class="drawer__section">
                <button type="button" class="drawer__title drawer__toggle" id="toggleMine" aria-expanded="true">
                    Charaktere
                </button>
                <div id="listMine" class="drawer__list">
                    <button class="drawer__item" disabled>(noch keine Daten)</button>
                </div>
            </div>

            <div class="drawer__section">
                <button type="button" class="drawer__title drawer__toggle" id="toggleNpcs" aria-expanded="false">
                    NPCs
                </button>
                <div id="listNpcs" class="drawer__list" hidden>
                    <button class="drawer__item" disabled>(noch keine Daten)</button>
                </div>
            </div>

            <div class="drawer__section" id="drawerActionsSection" hidden>
                <button type="button" class="drawer__title drawer__toggle" id="toggleActions" aria-expanded="true">
                    Aktionen
                </button>

                <div id="actionsMenu" class="actionsMenu drawer__list" hidden>
                    <button id="btnCreatePC" class="btn drawer__item" disabled hidden>Neuer Charakter</button>
                    <button id="btnCreateNPC" class="btn drawer__item" disabled hidden>Neuer NPC</button>
                    <button id="btnSave" class="btn btn--primary drawer__item" disabled hidden>Speichern</button>
                    <button id="btnDelete" class="btn btn--danger drawer__item" disabled hidden>Charakter
                        löschen</button>
                </div>
            </div>

            <button id="btnAdmin" class="btn drawer__item" hidden>Admin</button>
        </div>
    </div>

    <div id="backdrop" class="backdrop" hidden></div>

    <main class="page page--spells">
        <!-- Zauberangriffe -->
        <section id="sec-spell-attacks" data-nav-label="Zauberangriffe">
            <!-- Spell Attacks Panel (oben) -->
            <section class="card">
                <div class="card__header">
                    <div>
                        <div class="h2">Zauberangriffe</div>
                    </div>

                    <div class="row gap">
                        <label class="field field--mini">
                            <span class="label">Zauber-RW</span>
                            <input id="spellSaveDc" type="number" min="0" max="99" inputmode="numeric" />
                        </label>

                        <label class="field field--mini">
                            <span class="label">ATK-Boni</span>
                            <input id="spellAtkBonus" type="number" min="-99" max="99" inputmode="numeric" />
                        </label>

                        <label class="field field--mini">
                            <span class="label">Zauber-Atr</span>
                            <select id="spellAbility">
                                <option value="">—</option>
                                <option value="int">INT</option>
                                <option value="wis">WIS</option>
                                <option value="cha">CHA</option>
                            </select>
                        </label>
                    </div>
                </div>
            </section>
        </section>

        <!-- Tabs für Zaubergrade + Cantrips -->
        <!-- Slots + Panel (Tabs-Card enthält beides) -->
        <section id="sec-spell-slots" data-nav-label="Zauberslots">
            <section class="card">
                <div class="card__header card__header--tight">
                    <div>
                        <div class="h2">Zaubergrad</div>
                    </div>
                    <div class="tabs" role="tablist" aria-label="Zaubergrade">
                        <button class="tab is-active" role="tab" aria-selected="true" data-spell-level="cantrip">
                            CT
                        </button>
                        <button class="tab" role="tab" aria-selected="false" data-spell-level="1">1</button>
                        <button class="tab" role="tab" aria-selected="false" data-spell-level="2">2</button>
                        <button class="tab" role="tab" aria-selected="false" data-spell-level="3">3</button>
                        <button class="tab" role="tab" aria-selected="false" data-spell-level="4">4</button>
                        <button class="tab" role="tab" aria-selected="false" data-spell-level="5">5</button>
                        <button class="tab" role="tab" aria-selected="false" data-spell-level="6">6</button>
                        <button class="tab" role="tab" aria-selected="false" data-spell-level="7">7</button>
                        <button class="tab" role="tab" aria-selected="false" data-spell-level="8">8</button>
                        <button class="tab" role="tab" aria-selected="false" data-spell-level="9">9</button>
                    </div>
                </div>
                <div class="card__body">
                    <div class="h2">Zauberslots</div>
                    <div class="slotsConfig">
                        <label class="field field--mini">
                            <span class="label">Zauberslots festlegen</span>
                            <input id="spellSlotsCountInput" type="number" min="0" max="20" inputmode="numeric"
                                value="0" />
                        </label>
                    </div>
                    <div class="slotsView">
                        <div class="slotsBar">
                            <div class="slotsBar__right">
                                <div id="spellSlots" class="slots"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </section>

        <section id="sec-spell-panel" data-nav-label="Zauberpanel">
            <section class="card">
                <div class="card__header">
                    <div>
                        <div class="h2">Zauberpanel</div>
                    </div>
                </div>

                <div class="card__body">
                    <div class="tableWrap">
                        <table class="table table--spells" aria-label="Zauberpanel">
                            <thead>
                                <tr>
                                    <th style="width: 24%;">Zauber (Name)</th>
                                    <th style="width: 12%;">Zeit</th>
                                    <th style="width: 12%;">Reichweite</th>
                                    <th style="width: 12%;">Trefferwert</th>
                                    <th style="width: 10%;">Art</th>
                                    <th style="width: 24%;">Effekt</th>
                                    <th style="width: 48px;"></th>
                                </tr>
                            </thead>
                            <tbody id="spellPanelRows">
                                <tr class="rowHint">
                                    <td colspan="7" class="muted small">
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div id="spellDescriptionBox" class="spellDesc is-hidden" aria-live="polite">
                        <div class="spellDesc__header">
                            <div class="h3" id="spellDescTitle">Zaubername</div>
                            <button class="btn btn--ghost" id="btnCloseSpellDesc" type="button">Schließen</button>
                        </div>
                        <div class="spellDesc__body">
                            <textarea id="spellDescText" rows="8" maxlength="3000" readonly
                                placeholder="Beschreibung kommt später aus dem Zauberbuch…"></textarea>
                        </div>
                    </div>
                </div>
            </section>
        </section>

        <!-- Zauberbuch + Detail (unten, 2 Spalten) -->
        <section class="grid2">
            <!-- Zauberbuch Liste -->
            <section id="sec-spellbook" data-nav-label="Zauberbuch">
                <section class="card">
                    <div class="card__header">
                        <div>
                            <div class="h2">Zauberbuch</div>
                        </div>

                        <div class="row gap">
                            <button class="btn" id="btnAddSpell" type="button">+ Zauber hinzufügen</button>
                            <button class="btn btn--ghost" id="btnUseInPanel" type="button">Im Panel verwenden</button>
                            <button class="btn btn--danger" id="btnDeleteSpell" type="button">Löschen</button>
                        </div>
                    </div>

                    <div class="card__body">
                        <div id="spellbookList" class="spellbook">
                            <!-- UI-Placeholder -->
                            <div class="spellbook__empty muted small">
                                Keine Zauber im aktuellen Grad.
                            </div>
                        </div>
                    </div>
                </section>
            </section>

            <!-- Detail Editor -->
            <section id="sec-spell-details" data-nav-label="Zauber-Details">
                <section class="card spellDetailsCard is-collapsed">
                    <div class="card__header spellDetailsCard__header">
                        <div>
                            <div class="h2">Zauber-Details</div>
                        </div>
                    </div>

                    <div class="row gap">
                        <button class="btn btn--ghost" id="btnCloseSpellDetails" type="button">Schließen</button>
                    </div>
                    </div>

                    <div class="card__body spellDetailsCard__body">
                        <div class="formGrid">
                            <label class="field">
                                <span class="label">Name</span>
                                <input id="sb_name" type="text" maxlength="50" placeholder="z.B. Magic Missile" />
                            </label>

                            <label class="field">
                                <span class="label">Zeit/Dauer</span>
                                <input id="sb_time" type="text" maxlength="50"
                                    placeholder="z.B. 1 Aktion / Bonusaktion / 1 Stunde" />
                            </label>

                            <label class="field">
                                <span class="label">Reichweite</span>
                                <input id="sb_range" type="text" maxlength="50" placeholder="z.B. 36m" />
                            </label>

                            <label class="field">
                                <span class="label">Trefferwert</span>
                                <input id="sb_hit" type="text" maxlength="50" placeholder="z.B. +7 / Rettungswurf" />
                            </label>

                            <label class="field">
                                <span class="label">Art</span>
                                <input id="sb_kind" type="text" maxlength="50"
                                    placeholder="z.B. Feuer, Heilung, Kontrolle" />
                            </label>

                            <label class="field field--full">
                                <span class="label">Komponenten</span>
                                <input id="sb_effect" type="text" maxlength="100" placeholder="z.B. V, S, M" />
                            </label>

                            <label class="field field--full">
                                <span class="label">Beschreibung (lang)</span>
                                <textarea id="sb_desc" rows="10" maxlength="3000"
                                    placeholder="Voller Text des Zaubers…"></textarea>
                            </label>
                        </div>
                    </div>
                </section>
            </section>
        </section>
    </main>

    <div id="navBackdrop" class="backdrop" hidden></div>

    <aside id="navDrawer" class="drawer drawer--right" aria-hidden="true">
        <div class="drawer__header">
            <strong>Navigation</strong>
            <button id="btnNavClose" class="btn" aria-label="Schließen">✕</button>
        </div>
        <div id="navList" class="drawer__content">
            <!-- Items kommen per JS -->
        </div>
    </aside>
    <script type="module" src="/app.js"></script>
    <script type="module" src="/spells.js"></script>
</body>

</html>
