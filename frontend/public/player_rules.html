<!doctype html>
<html lang="de">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Spielerhandbuch</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <main class="page page--playerRules">
        <section class="rulesCard">
            <div class="rulesCard__header">
                <h1 class="rulesCard__title">Spielerhandbuch</h1>
                <p class="rulesCard__subtext">
                    Wähle ein Kapitel oder einen Unterpunkt aus, um später direkt zur passenden PDF-Seite zu springen.
                </p>
            </div>

            <!-- KAPITEL 2 -->
            <div class="ruleSection">
                <button class="ruleSection__toggle" type="button" aria-expanded="false">
                    <span class="ruleSection__left">
                        <span class="ruleSection__title">Völker</span>
                    </span>
                    <span class="ruleSection__icon">⌄</span>
                </button>

                <div class="ruleSection__body" hidden>
                    <button class="ruleEntryButton" type="button">
                        Völker
                    </button>

                    <div class="ruleTopicList">
                        <button class="ruleTopicButton" type="button">Ein Volk auswählen</button>
                        <button class="ruleTopicButton" type="button">Elfen</button>
                        <button class="ruleTopicButton" type="button">Halblinge</button>

                    </div>

                <div class="ruleSection__body" hidden>

                        <button class="ruleTopicButton" type="button">Zauberer</button>
                    </div>

                    </span>
                    <span class="ruleSection__icon">⌄</span>

                <div class="ruleSection__body" hidden>

                    <div class="ruleTopicList">

                    <span class="ruleSection__left">

                    <span class="ruleSection__icon">⌄</span>
